name: Build & Push Docker Image

on:
  workflow_call:
    inputs:
      team:
        required: false
        type: string
        description: Which Nais team's access token to use
        default: 'okonomi'
      pnpm-version:
        required: false
        type: string
        description: pnpm version to build with
        default: '10'
      node-version:
        required: false
        type: string
        description: Node version to build with
        default: '22'
      image-tag:
        required: false
        type: string
        description: Docker image tag
        default: 'latest'
      image-suffix:
        required: false
        type: string
        description: Suffix to append to the image tag
        default: ''
      build-command:
        required: false
        type: string
        description: Command to build the application
        default: 'pnpm run build'
      cdn-source:
        required: false
        type: string
        description: If uploading assets to CDN is wanted, set this to the 'source' parameter that should be sent to nais/deploy/actions/cdn-upload/v2; e.g. './dist/client/_astro'
        default: ''
      cdn-destination:
        required: false
        type: string
        description: If uploading assets to CDN is wanted, set this to the 'destination' parameter that should be sent to nais/deploy/actions/cdn-upload/v2; typically set to the name of the application
        default: ''
    secrets:
      ASTRO_KEY:
        required: false
        description: Optional Astro key

    outputs:
      image:
        description: Google Artifact Registery image
        value: ${{ jobs.build-push-image.outputs.image }}

jobs:
  build-push-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # ratchet:actions/checkout@v5
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # ratchet:pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm-version }}
          run_install: false

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # ratchet:actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'pnpm'

      - name: Install dependencies for client
        run: |
          pnpm config set //npm.pkg.github.com/:_authToken $NODE_AUTH_TOKEN
          pnpm config set engine-strict true
          pnpm config set @navikt:registry https://npm.pkg.github.com
          pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.READER_TOKEN }}

      - name: Build app
        run: ${{ inputs.build-command }}
        env:
          ASTRO_KEY: ${{ secrets.ASTRO_KEY }}

      - name: Upload assets to CDN
        if: ${{ inputs.cdn-source != '' && inputs.cdn-destination != '' }}
        uses: nais/deploy/actions/cdn-upload/v2@fa754451577294aae42872a69b888b3470478ec1 # v2
        with:
          team: ${{ inputs.team }}
          source: ${{ inputs.cdn-source }}
          destination: ${{ inputs.cdn-destination }}

      - name: Push Docker Image to GAR
        uses: nais/docker-build-push@078e460885ed0424b60d45ce9220b4be1748be9d # ratchet:nais/docker-build-push@v0
        id: docker-build-push
        with:
          team: ${{ inputs.team }}
          image_suffix: ${{ inputs.image-suffix }}
          tag: ${{ inputs.image-tag }}
    outputs:
      image: ${{ steps.docker-build-push.outputs.image }}
